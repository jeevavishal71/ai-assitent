<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Assistant</title>
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AI Assistant" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #1a1a2e;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      color: #a78bfa;
    }

    .header-sub {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .clear-btn {
      background: transparent;
      border: 1px solid #3a3a5a;
      color: #888;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg.user {
      background: #6d28d9;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg.ai {
      background: #1e1e35;
      color: #e0e0e0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid #2a2a4a;
    }

    .msg.thinking {
      background: #1e1e35;
      color: #666;
      align-self: flex-start;
      border: 1px dashed #3a3a5a;
      font-style: italic;
      font-size: 13px;
    }

    .msg .lang-badge {
      font-size: 10px;
      background: rgba(167,139,250,0.2);
      color: #a78bfa;
      padding: 2px 6px;
      border-radius: 8px;
      margin-bottom: 6px;
      display: inline-block;
    }

    .speak-btn {
      background: transparent;
      border: none;
      color: #a78bfa;
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
      margin-top: 6px;
      display: block;
    }

    .bottom-bar {
      background: #1a1a2e;
      border-top: 1px solid #2a2a4a;
      padding: 12px 16px;
      flex-shrink: 0;
    }

    .text-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      align-items: flex-end;
    }

    #textInput {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #3a3a5a;
      color: #e0e0e0;
      padding: 10px 14px;
      border-radius: 24px;
      font-size: 14px;
      resize: none;
      max-height: 100px;
      font-family: inherit;
    }

    #textInput:focus { outline: none; border-color: #6d28d9; }
    #textInput::placeholder { color: #555; }

    .send-btn {
      background: #6d28d9;
      border: none;
      color: #fff;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .voice-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    #micBtn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #6d28d9, #4c1d95);
      color: #fff;
      font-size: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 0 rgba(109,40,217,0.5);
      transition: transform 0.1s;
      position: relative;
    }

    #micBtn.listening {
      animation: pulse 1.2s infinite;
      background: linear-gradient(135deg, #dc2626, #991b1b);
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(220,38,38,0.6); }
      70% { box-shadow: 0 0 0 20px rgba(220,38,38,0); }
      100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); }
    }

    .mic-label {
      font-size: 11px;
      color: #555;
      text-align: center;
      margin-top: 4px;
    }

    .api-setup {
      position: fixed;
      inset: 0;
      background: #0f0f1a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }

    .api-card {
      background: #1a1a2e;
      border: 1px solid #3a3a5a;
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 380px;
    }

    .api-card h2 { color: #a78bfa; font-size: 20px; margin-bottom: 8px; }
    .api-card p { color: #888; font-size: 13px; margin-bottom: 20px; line-height: 1.6; }

    .api-card input {
      width: 100%;
      background: #0f0f1a;
      border: 1px solid #3a3a5a;
      color: #e0e0e0;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .api-card input:focus { outline: none; border-color: #6d28d9; }

    .api-card button {
      width: 100%;
      background: #6d28d9;
      border: none;
      color: #fff;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 600;
    }

    .status-bar {
      text-align: center;
      font-size: 12px;
      color: #555;
      padding: 4px 0;
    }

    #autoSpeak {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #666;
      cursor: pointer;
    }

    .toggle {
      width: 36px;
      height: 20px;
      background: #3a3a5a;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle.on { background: #6d28d9; }

    .toggle::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: left 0.2s;
    }

    .toggle.on::after { left: 18px; }

    .welcome {
      text-align: center;
      color: #444;
      font-size: 14px;
      margin: auto;
      padding: 20px;
    }

    .welcome .icon { font-size: 48px; margin-bottom: 12px; }
    .welcome h3 { color: #666; font-weight: 500; margin-bottom: 6px; }
  </style>
</head>
<body>

<header>
  <div>
    <div class="header-title">🤖 AI Assistant</div>
    <div class="header-sub" id="statusText">Ready</div>
  </div>
  <button class="clear-btn" onclick="clearChat()">Clear</button>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <div class="icon">🎤</div>
    <h3>வணக்கம்! Hello!</h3>
    <p>Mic button press பண்ணி Tamil அல்லது English-ல் பேசுங்க<br>அல்லது text type பண்ணுங்க</p>
  </div>
</div>

<div class="bottom-bar">
  <div class="text-row">
    <textarea id="textInput" placeholder="Type here... / இங்கே type பண்ணுங்க..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendText()}"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    <button class="send-btn" onclick="sendText()">➤</button>
  </div>
  <div class="voice-row">
    <div style="display:flex;flex-direction:column;align-items:center;">
      <button id="micBtn" onclick="toggleMic()">🎤</button>
      <div class="mic-label" id="micLabel">Tap to speak</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <label id="autoSpeak" onclick="toggleAutoSpeak()">
        <div class="toggle on" id="autoSpeakToggle"></div>
        <span>Auto speak</span>
      </label>
      <div style="font-size:11px;color:#555;" id="langDetected">Language: Auto</div>
    </div>
  </div>
</div>

<script>
const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent';
const apiKey = 'AQ.Ab8RN6LidCL15RmG1dnl07AOWdl0AydTRcHJ_NdW912KtGQxSw'; // உங்கள் Gemini API Key இங்கே paste பண்ணுங்க
let recognition = null;
let isListening = false;
let autoSpeak = true;
let chatHistory = [];


function toggleAutoSpeak() {
  autoSpeak = !autoSpeak;
  document.getElementById('autoSpeakToggle').classList.toggle('on', autoSpeak);
}

function clearChat() {
  chatHistory = [];
  const chat = document.getElementById('chat');
  chat.innerHTML = `<div class="welcome" id="welcome">
    <div class="icon">🎤</div>
    <h3>வணக்கம்! Hello!</h3>
    <p>Mic button press பண்ணி Tamil அல்லது English-ல் பேசுங்க<br>அல்லது text type பண்ணுங்க</p>
  </div>`;
}

function addMessage(text, type, lang) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${type}`;

  if (type === 'ai' && lang) {
    div.innerHTML = `<span class="lang-badge">${lang === 'ta' ? '🇮🇳 Tamil' : '🌐 English'}</span><br>${text}`;
    const speakBtn = document.createElement('button');
    speakBtn.className = 'speak-btn';
    speakBtn.textContent = '🔊 Read aloud';
    speakBtn.onclick = () => speakText(text, lang);
    div.appendChild(speakBtn);
  } else {
    div.textContent = text;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function detectLang(text) {
  const tamilChars = (text.match(/[\u0B80-\u0BFF]/g) || []).length;
  return tamilChars > 2 ? 'ta' : 'en';
}

async function askGemini(userText) {
  setStatus('Thinking...');

  const lang = detectLang(userText);
  document.getElementById('langDetected').textContent = `Language: ${lang === 'ta' ? 'Tamil' : 'English'}`;

  const systemPrompt = lang === 'ta'
    ? 'நீங்கள் ஒரு helpful AI assistant. எப்போதும் Tamil-ல் பதில் சொல்லுங்கள். சுருக்கமாகவும் தெளிவாகவும் பேசுங்கள்.'
    : 'You are a helpful AI assistant. Always reply in English. Be concise and clear.';

  chatHistory.push({ role: 'user', parts: [{ text: userText }] });

  const body = {
    system_instruction: { parts: [{ text: systemPrompt }] },
    contents: chatHistory
  };

  try {
    const res = await fetch(`${GEMINI_URL}?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await res.json();

    if (data.error) throw new Error(data.error.message);

    const reply = data.candidates[0].content.parts[0].text;
    chatHistory.push({ role: 'model', parts: [{ text: reply }] });

    addMessage(reply, 'ai', lang);
    if (autoSpeak) speakText(reply, lang);
    setStatus('Ready');
  } catch (err) {
    addMessage('Error: ' + err.message, 'ai', null);
    setStatus('Error!');
  }
}

function speakText(text, lang) {
  window.speechSynthesis.cancel();
  const clean = text.replace(/[#*`]/g, '').trim();
  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang = lang === 'ta' ? 'ta-IN' : 'en-IN';
  utter.rate = 0.9;
  utter.pitch = 1;

  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => v.lang.startsWith(lang === 'ta' ? 'ta' : 'en'));
  if (preferred) utter.voice = preferred;

  window.speechSynthesis.speak(utter);
}

function sendText() {
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  input.value = '';
  input.style.height = 'auto';
  askGemini(text);
}

function toggleMic() {
  if (isListening) {
    stopMic();
  } else {
    startMic();
  }
}

function startMic() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert('உங்கள் browser-ல் voice recognition support இல்லை. Chrome use பண்ணுங்க.');
    return;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'ta-IN';

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micBtn').textContent = '⏹';
    document.getElementById('micLabel').textContent = 'Listening...';
    setStatus('🎤 Listening...');
  };

  recognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    document.getElementById('textInput').value = transcript;

    const detectedLang = detectLang(transcript);
    document.getElementById('langDetected').textContent = `Detected: ${detectedLang === 'ta' ? 'Tamil 🇮🇳' : 'English 🌐'}`;
  };

  recognition.onend = () => {
    const text = document.getElementById('textInput').value.trim();
    stopMic();
    if (text) {
      addMessage(text, 'user');
      document.getElementById('textInput').value = '';
      document.getElementById('textInput').style.height = 'auto';
      askGemini(text);
    }
  };

  recognition.onerror = (e) => {
    stopMic();
    if (e.error !== 'no-speech') setStatus('Mic error: ' + e.error);
  };

  recognition.start();
}

function stopMic() {
  if (recognition) recognition.stop();
  isListening = false;
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('micBtn').textContent = '🎤';
  document.getElementById('micLabel').textContent = 'Tap to speak';
  setStatus('Ready');
}

function setStatus(msg) {
  document.getElementById('statusText').textContent = msg;
}

window.speechSynthesis.onvoiceschanged = () => {};
speechSynthesis.getVoices();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>

</body>
</html>
